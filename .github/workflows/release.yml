name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          tag = "${{ github.ref_name }}"
          text = pathlib.Path("forge/_version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__ = "([^"]+)"', text)
          if match is None:
              sys.exit("Could not find __version__ in forge/_version.py")
          expected = f"v{match.group(1)}"
          if tag != expected:
              sys.exit(f"Tag {tag} does not match package version {expected}")
          PY

      - name: Build
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions
        uses: pypa/gh-action-pypi-publish@release/v1
